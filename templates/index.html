<!DOCTYPE html>
<html>
<head>
    <title>Electric Load Forecasting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        .container {
            max-width: 1200px;
            padding: 2rem;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        h2 {
            color: #2c3e50;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        .nav-tabs {
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 2rem;
        }

        .nav-tabs .nav-link {
            color: #6c757d;
            border: none;
            padding: 1rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-tabs .nav-link:hover {
            color: #2c3e50;
            border: none;
            background-color: rgba(44, 62, 80, 0.1);
        }

        .nav-tabs .nav-link.active {
            color: #2c3e50;
            border: none;
            border-bottom: 3px solid #2c3e50;
            background-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #2c3e50;
            box-shadow: none;
        }

        .form-range {
            height: 8px;
        }

        .form-range::-webkit-slider-thumb {
            background: #2c3e50;
        }

        .btn-primary {
            background-color: #2c3e50;
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #34495e;
            transform: translateY(-2px);
        }

        .chart-container {
            background-color: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            margin-top: 2rem;
            height: 500px;
        }

        .plot-container {
            background-color: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            margin-top: 2rem;
            height: 600px;
        }

        #k_value_display {
            font-size: 1.2rem;
            font-weight: 500;
            color: #2c3e50;
            margin-top: 0.5rem;
        }

        .tab-content {
            padding: 1.5rem 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h2 {
                font-size: 2rem;
            }
            
            .nav-tabs .nav-link {
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Electric Load Forecasting</h2>
        
        <!-- Navigation tabs -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="prediction-tab" data-bs-toggle="tab" 
                        data-bs-target="#prediction" type="button" role="tab">Load Prediction</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="cluster-tab" data-bs-toggle="tab" 
                        data-bs-target="#cluster" type="button" role="tab">Cluster Analysis</button>
            </li>
        </ul>

        <!-- Tab content -->
        <div class="tab-content" id="myTabContent">
            <!-- Prediction Tab -->
            <div class="tab-pane fade show active" id="prediction" role="tabpanel">
                <form id="predictionForm" class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="city">Select City:</label>
                                <select class="form-control" id="city" name="city" required>
                                    {% for city in cities %}
                                    <option value="{{ city }}">{{ city.replace('_', ' ').title() }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="model">Select Model:</label>
                                <select class="form-control" id="model" name="model" required>
                                    {% for model in models %}
                                    <option value="{{ model }}">{{ model.title() }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="start_date">Start Date:</label>
                                <input type="date" class="form-control" id="start_date" name="start_date" 
                                       min="{{ min_date }}" max="{{ max_date }}" required>
                            </div>
                        </div>
                        
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="end_date">End Date:</label>
                                <input type="date" class="form-control" id="end_date" name="end_date"
                                       min="{{ min_date }}" max="{{ max_date }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row mt-3" id="lagPeriodContainer" style="display: none;">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="lag_period">Lag Period (hours):</label>
                                <input type="range" class="form-range" id="lag_period" name="lag_period" 
                                       min="1" max="168" value="24">
                                <div class="text-center" id="lag_period_value">24 hours</div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary mt-3">Predict</button>
                </form>
                
                <div class="chart-container">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>

            <!-- Cluster Tab -->
            <div class="tab-pane fade" id="cluster" role="tabpanel">
                <div class="row mt-3">
                    <div class="col-md-6 mx-auto">
                        <div class="form-group">
                            <label for="k_value" class="form-label">Number of Clusters (k):</label>
                            <input type="range" class="form-range" id="k_value" 
                                   min="1" max="10" value="4" step="1">
                            <div class="text-center" id="k_value_display">k = 4</div>
                        </div>
                    </div>
                </div>
                <div class="plot-container" id="clusterPlot"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Show/hide lag period slider based on model selection
        document.getElementById('model').addEventListener('change', function() {
            const lagContainer = document.getElementById('lagPeriodContainer');
            lagContainer.style.display = this.value === 'naive_model' ? 'block' : 'none';
        });

        // Update lag period value display
        document.getElementById('lag_period').addEventListener('input', function() {
            document.getElementById('lag_period_value').textContent = this.value + ' hours';
        });

        let chart = null;

        document.getElementById('predictionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }
                
                // Destroy existing chart if it exists
                if (chart) {
                    chart.destroy();
                }
                
                // Create new chart
                const ctx = document.getElementById('predictionChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.dates,
                        datasets: [
                            {
                                label: 'Actual Demand',
                                data: data.actual,
                                borderColor: 'rgb(75, 192, 192)',
                                tension: 0.1
                            },
                            {
                                label: 'Predicted Demand',
                                data: data.predictions,
                                borderColor: 'rgb(255, 99, 132)',
                                tension: 0.1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: 'Demand'
                                }
                            },
                            x: {
                                title: {
                                    display: true,
                                    text: data.same_day ? 'Hour of Day' : 'Date'
                                }
                            }
                        },
                        plugins: {
                            title: {
                                display: true,
                                text: data.same_day ? 'Hourly Actual vs Predicted Demand' : 'Daily Actual vs Predicted Demand'
                            },
                            legend: {
                                display: true,
                                position: 'top'
                            }
                        }
                    }
                });
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while making the prediction');
            });
        });

        // Cluster visualization code
        document.getElementById('k_value').addEventListener('input', function() {
            const kValue = this.value;
            document.getElementById('k_value_display').textContent = `k = ${kValue}`;
            updateClusterVisualization(kValue);
        });

        function updateClusterVisualization(kValue) {
            const formData = new FormData();
            formData.append('k_value', kValue);
            
            fetch('/get_cluster_viz', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.error('Error:', data.error);
                    return;
                }

                // Create scatter plot data
                const traces = [];
                const uniqueLabels = [...new Set(data.cluster_labels)];
                
                uniqueLabels.forEach(label => {
                    const points = data.pca_coords.filter((_, i) => data.cluster_labels[i] === label);
                    const x = points.map(p => p[0]);
                    const y = points.map(p => p[1]);
                    
                    traces.push({
                        x: x,
                        y: y,
                        mode: 'markers',
                        type: 'scatter',
                        name: `Cluster ${label}`,
                        marker: {
                            size: 5
                        }
                    });
                });

                const layout = {
                    title: `PCA Visualization (k=${kValue})`,
                    xaxis: {title: 'Principal Component 1'},
                    yaxis: {title: 'Principal Component 2'},
                    showlegend: true
                };

                Plotly.newPlot('clusterPlot', traces, layout);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('clusterPlot').innerHTML = 
                    'Error loading cluster visualization';
            });
        }

        // Load initial visualization when cluster tab is shown
        document.getElementById('cluster-tab').addEventListener('click', function() {
            if (!document.getElementById('clusterPlot').hasChildNodes()) {
                updateClusterVisualization(4);  // Default k value
            }
        });
    </script>
</body>
</html>
